{% load static %}
<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Set new password | Digital Wardrobe</title><meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="stylesheet" href="{% static 'css/styles.css' %}"></head>
<body class="auth-page">
<main class="auth-card glass-card">
    <div class="auth-brand"><span>DW</span><div><strong>Digital Wardrobe</strong><small>Reset password</small></div></div>
    <h1>Set new password</h1>
    {% if validlink %}
        <form method="post" class="smart-form auth-form">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-field password-field"><label for="{{ field.id_for_label }}">{{ field.label }}</label><div class="password-wrap">{{ field }}<button type="button" class="password-toggle" aria-label="Show password">👁</button></div>{{ field.errors }}</div>
            {% endfor %}
            <button type="submit" class="primary-button">Change Password</button>
        </form>
    {% else %}
        <p class="auth-subtitle">This reset link is invalid or expired.</p>
        <a href="{% url 'password_reset' %}" class="primary-link">Request new link</a>
    {% endif %}
</main>
<script src="{% static 'js/password-toggle.js' %}"></script>
</body>
</html>
